version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tek-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: tek_system
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build: .
    container_name: web
    restart: always
    command: sh -c "yarn start:prod"
    env_file:
      - .env
    ports:
      - '3000:3000'
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
