version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tek-mongodb
    restart: unless-stopped
    entrypoint: >
      bash -c "
        openssl rand -base64 756 > /etc/mongo-keyfile &&
        chmod 400 /etc/mongo-keyfile &&
        chown mongodb:mongodb /etc/mongo-keyfile &&
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /etc/mongo-keyfile --bind_ip_all
      "
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: user
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: tek_system
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '-u', 'user', '-p', 'password', '--authenticationDatabase', 'admin', '--eval', "try { rs.status().ok } catch(e) { rs.initiate().ok }"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: web
    command: yarn start:dev
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data:
